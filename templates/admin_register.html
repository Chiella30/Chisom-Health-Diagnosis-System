{% extends "base.html" %}
{% block title %}Admin Registration - Nigerian Health Diagnosis System{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-shield"></i>
            <h1>Admin Registration</h1>
            <p>Register as a system administrator</p>
        </div>
        <form method="POST" action="{{ url_for('admin_register') }}" class="auth-form">
            <div class="form-group">
                <label for="full_name"><i class="fas fa-user"></i> Full Name *</label>
                <input type="text" id="full_name" name="full_name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address *</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="Min 6 characters" minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm password">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="phone_no"><i class="fas fa-phone"></i> Phone Number</label>
                <input type="tel" id="phone_no" name="phone_no" placeholder="e.g., +234 801 234 5678">
            </div>
            <div class="form-group">
                <label for="admin_code"><i class="fas fa-key"></i> Admin Registration Code *</label>
                <input type="password" id="admin_code" name="admin_code" required placeholder="Enter admin code">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-shield"></i> Register as Admin
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            <p>Register as patient? <a href="{{ url_for('register') }}">Patient Registration</a></p>
        </div>
    </div>
</section>
{% endblock %}
