{% extends "base.html" %}
{% block title %}Register - Nigerian Health Diagnosis System{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus"></i>
            <h1>Create Account</h1>
            <p>Register as a patient to use the symptom checker</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="full_name"><i class="fas fa-user"></i> Full Name *</label>
                <input type="text" id="full_name" name="full_name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address *</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="Min 6 characters" minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm password">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="phone_no"><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone_no" name="phone_no" placeholder="e.g., +234 801 234 5678">
                </div>
                <div class="form-group">
                    <label for="date_of_birth"><i class="fas fa-calendar"></i> Date of Birth</label>
                    <input type="date" id="date_of_birth" name="date_of_birth">
                </div>
            </div>
            <div class="form-group">
                <label for="location"><i class="fas fa-map-marker-alt"></i> Location (State/LGA)</label>
                <input type="text" id="location" name="location" placeholder="e.g., Lagos State, Ikeja LGA">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            <p>Are you an admin? <a href="{{ url_for('admin_register') }}">Register as Admin</a></p>
        </div>
    </div>
</section>
{% endblock %}
